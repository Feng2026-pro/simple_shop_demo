<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>电商系统</title>
</head>
<body>
<h1>商品列表</h1>

<a href="/add_product">新增商品</a> |
<a href="/orders">查看订单</a>

<table border="1" cellpadding="10" cellspacing="0">
    <tr>
        <th>ID</th>
        <th>商品名称</th>
        <th>价格</th>
        <th>库存</th>
        <th>操作</th>
    </tr>

    {% for product in products %}
    <tr>
        <td>{{ product[0] }}</td>
        <td>{{ product[1] }}</td>
        <td>¥{{ product[2] }}</td>
        <td>{{ product[3] }}</td>
        <td><a href="/order/{{ product[0] }}">下单</a></td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
