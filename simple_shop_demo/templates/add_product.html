<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>新增商品</title>
</head>
<body>

<h1>新增商品</h1>

<form method="post">
    <p>商品名称：<input type="text" name="name" required></p>
    <p>商品价格：<input type="number" step="0.01" name="price" required></p>
    <p>商品库存：<input type="number" name="stock" required></p>

    <button type="submit">保存商品</button>
</form>

<br>

<a href="/">返回首页</a>

</body>
</html>
